<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Project</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main>
        <h2>회원가입</h2>
        <form id="signupForm">
            <div class="inputBox">
                <input id="userid" type="text" name="userid" placeholder="아이디를 입력하세요" maxlength="20">
            </div>
            <div class="inputBox">
                <input id="password" type="password" name="password" placeholder="비밀번호를 입력하세요" maxlength="20">
            </div>
            <div class="inputBox">
                <input id="name" type="text" name="name" placeholder="이름을 입력하세요" maxlength="20">
            </div>
            <div class="inputBox">
                <input id="email" type="text" name="email" placeholder="이메일을 입력하세요" maxlength="20">
            </div>
            <button id="signupBtn" class="submitBtn" type="submit">회원가입</button>
            <div class="linkBox">
                <a href="/index.html">로그인</a>
            </div>
        </form>
    </main>
    <script src="/js/signup.js"></script>
</body>
</html>
